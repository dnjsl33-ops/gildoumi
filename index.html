fIn.addEventListener('change',function(ev){var f=ev.target.files&&ev.target.files[0];if(!f||!uTgt)return;var r=new FileReader();r.onload=function(rev){var s=S.steps[uTgt.si];if(!s.photos)s.photos=[];if(uTgt.pi<s.photos.length)s.photos[uTgt.pi]=rev.target.result;else{s.photos.push(rev.target.result);if(!s.pl)s.pl=[];s.pl.push('사진 '+s.photos.length)}uTgt=null;R()};r.readAsDataURL(f);ev.target.value=''});
function doUp(si,pi){uTgt={si:si,pi:pi};fIn.click()}
function swap(i,j){var t=S.steps[i];S.steps[i]=S.steps[j];S.steps[j]=t;R()}

function syncInfo(idx){
  var st=S.steps[idx];if(!st.info)st.info={};var tp=st.transport;
  if(tp==='local_bus')st.info.platform=st.from;
  if(tp==='shuttle')st.info.platform=st.from;
  if(tp==='taxi')st.info.address=st.to;
  if(tp==='ktx'||tp==='srt')st.info.destination=st.to;
  if(tp==='subway')st.info.destination=st.to;
  if(tp==='transfer')st.info.transferStation=st.from;
}
function propagate(fromIdx,val){
  for(var i=fromIdx+1;i<S.steps.length;i++){
    var st=S.steps[i];st.from=val;if(!st.info)st.info={};syncInfo(i);
    if(st.transport==='transfer'){st.to=val;st.info.transferStation=val}else break;
  }
}

function toast(msg){
  var t=h('div',{class:'toast'},msg);app.appendChild(t);
  setTimeout(function(){t.remove()},2000);
}

// ══════ JSONBin API ══════
function saveToCloud(cb){
  if(!CFG.binId||!CFG.apiKey){toast('⚠️ 먼저 초기 설정을 완료하세요');return}
  var data={phone:S.phone,dest:S.dest,departTime:S.departTime,appointTime:S.appointTime,steps:S.steps};
  var xhr=new XMLHttpRequest();
  xhr.open('PUT','https://api.jsonbin.io/v3/b/'+CFG.binId);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.setRequestHeader('X-Master-Key',CFG.apiKey);
  xhr.onload=function(){if(xhr.status===200){toast('✅ 저장 완료! 부모님 앱에 반영됩니다');if(cb)cb()}else{toast('❌ 저장 실패: '+xhr.status)}};
  xhr.onerror=function(){toast('❌ 네트워크 오류')};
  xhr.send(JSON.stringify(data));
}

// ══════ RENDER ══════
function R(){
  app.innerHTML='';
  if(!CFG.binId||!CFG.apiKey){rSetup();return}
  if(!loggedIn){rLogin();return}
  rMain();
}

// ── Setup (최초 1회) ──
function rSetup(){
  var w=h('div',{class:'login'});
  w.appendChild(h('div',{style:{fontSize:'56px'}},'⚙️'));
  w.appendChild(h('h1',{style:{fontSize:'24px',fontWeight:'800',color:'#1A1A1A'}},'초기 설정'));
  w.appendChild(h('p',{style:{fontSize:'15px',color:'#6B6B6B',lineHeight:'1.6'}},'JSONBin.io에서 무료 계정을 만들고\nBin ID와 API Key를 입력하세요'));

  var link=h('a',{href:'https://jsonbin.io',target:'_blank',style:{color:'#FF6B35',fontWeight:'700',fontSize:'16px'}},'jsonbin.io 바로가기 →');
  w.appendChild(link);

  var f1=h('div',{class:'fd',style:{width:'100%',maxWidth:'320px'}});
  f1.appendChild(h('label',null,'Bin ID'));
  var inp1=h('input',{type:'text',placeholder:'예: 65a1b2c3...',value:CFG.binId});
  f1.appendChild(inp1);w.appendChild(f1);

  var f2=h('div',{class:'fd',style:{width:'100%',maxWidth:'320px'}});
  f2.appendChild(h('label',null,'API Key (X-Master-Key)'));
  var inp2=h('input',{type:'text',placeholder:'예: $2a$10...',value:CFG.apiKey});
  f2.appendChild(inp2);w.appendChild(f2);

  var f3=h('div',{class:'fd',style:{width:'100%',maxWidth:'320px'}});
  f3.appendChild(h('label',null,'비밀번호 설정 (보호자 접속용)'));
  var inp3=h('input',{type:'password',placeholder:'4자리 이상',value:CFG.pw});
  f3.appendChild(inp3);w.appendChild(f3);

  var btn=h('button',{class:'bb',style:{background:'#FF6B35',maxWidth:'320px'}});
  btn.textContent='설정 완료';
  btn.addEventListener('click',function(){
    if(!inp1.value||!inp2.value||!inp3.value){toast('모든 필드를 입력하세요');return}
    CFG.binId=inp1.value.trim();CFG.apiKey=inp2.value.trim();CFG.pw=inp3.value;
    localStorage.setItem('gd_bin',CFG.binId);
    localStorage.setItem('gd_key',CFG.apiKey);
    localStorage.setItem('gd_pw',CFG.pw);
    toast('✅ 설정 완료!');R();
  });
  w.appendChild(btn);

  w.appendChild(h('p',{style:{fontSize:'12px',color:'#999',marginTop:'16px',lineHeight:'1.6'}},'* Bin ID: JSONBin에서 Create Bin 후 생성되는 ID\n* API Key: Account Settings → API Keys'));
  app.appendChild(w);
}

// ── Login ──
function rLogin(){
  var w=h('div',{class:'login'});
  w.appendChild(h('div',{style:{fontSize:'56px'}},'🔒'));
  w.appendChild(h('h1',{style:{fontSize:'24px',fontWeight:'800',color:'#1A1A1A'}},'보호자 로그인'));
  w.appendChild(h('p',{style:{fontSize:'15px',color:'#6B6B6B'}},'비밀번호를 입력하세요'));
  var inp=h('input',{type:'password',placeholder:'••••'});
  inp.addEventListener('keydown',function(ev){if(ev.key==='Enter')tryLogin()});
  w.appendChild(inp);
  function tryLogin(){if(inp.value===CFG.pw){loggedIn=true;R()}else{toast('❌ 비밀번호가 틀렸습니다')}}
  var btn=h('button',{class:'bb',style:{background:'#FF6B35',maxWidth:'280px'}});
  btn.textContent='로그인';btn.addEventListener('click',tryLogin);
  w.appendChild(btn);
  var reset=h('button',{style:{fontSize:'13px',color:'#999',marginTop:'12px'}});
  reset.textContent='초기 설정 변경';
  reset.addEventListener('click',function(){localStorage.clear();CFG.binId='';CFG.apiKey='';CFG.pw='';R()});
  w.appendChild(reset);
  app.appendChild(w);
}

// ── Main ──
function rMain(){
  var hdr=h('div',{class:'hdr'});
  hdr.appendChild(h('h1',{style:{fontSize:'22px',fontWeight:'800',color:'#FF6B35'}},'👨‍👩‍👧 보호자 설정'));
  hdr.appendChild(h('p',{style:{fontSize:'13px',color:'#6B6B6B',marginTop:'4px'}},'경로를 설정하고 저장하면 부모님 앱에 자동 반영됩니다'));
  app.appendChild(hdr);

  var w=h('div',{class:'wrap'});

  // 기본 정보
  var info=h('div',{class:'cd'});
  info.appendChild(h('h2',{style:{fontSize:'16px',fontWeight:'800',color:'#1A1A1A',marginBottom:'10px'}},'📋 기본 정보'));
  [['origin','출발지',S.origin],['dest','목적지',S.dest],['departTime','출발 시간',S.departTime],['appointTime','예약 시간',S.appointTime],['phone','📞 보호자 연락처',S.phone]].forEach(function(f){
    var fd=h('div',{class:'fd'});fd.appendChild(h('label',null,f[1]));
    var inp=h('input',{type:'text',value:f[2]});inp.addEventListener('input',function(ev){S[f[0]]=ev.target.value});
    fd.appendChild(inp);info.appendChild(fd);
  });
  w.appendChild(info);

  // 추천 경로
  var tps=h('div',{class:'tpls'});
  [['srt+shuttle','SRT+셔틀','버스→SRT→셔틀'],['ktx+srt+shuttle','KTX+SRT','버스→KTX→환승→SRT→셔틀'],['ktx+shuttle','KTX+셔틀','버스→KTX→환승→KTX→지하철→셔틀']].forEach(function(tb){
    var sl=S.selTpl===tb[0];
    var btn=h('button',{class:'tpl'+(sl?' sel':'')});
    btn.addEventListener('click',function(){S.selTpl=tb[0];S.steps=cp(TPL[tb[0]]);R()});
    btn.appendChild(h('span',{style:{fontSize:'13px',fontWeight:'700',color:sl?'#FF6B35':'#1A1A1A',display:'block'}},tb[1]));
    btn.appendChild(h('span',{style:{fontSize:'11px',color:'#6B6B6B'}},tb[2]));
    tps.appendChild(btn);
  });
  w.appendChild(tps);

  // 이동 단계
  var sec=h('div',{class:'sth'});
  sec.appendChild(h('h2',{style:{fontSize:'17px',fontWeight:'800',color:'#1A1A1A'}},'🗺️ 이동 단계'));
  var addBtn=h('button',{style:{padding:'5px 12px',borderRadius:'8px',background:'#FFF0E8',border:'1.5px solid #FF6B35',color:'#FF6B35',fontWeight:'700',fontSize:'13px'}});
  addBtn.textContent='+ 추가';
  addBtn.addEventListener('click',function(){S.steps.push({from:'출발지',to:'도착지',transport:'walk',instruction:'새 단계',sub:null,duration:'약 ?분',drv:null,voice:'새 단계입니다.',info:{},photos:[],pl:[],np:null});R()});
  sec.appendChild(addBtn);
  w.appendChild(sec);

  // Steps
  S.steps.forEach(function(st,i){
    var t=gT(st.transport);
    var card=h('div',{class:'sc'});
    var top=h('div',{class:'sc-top'});
    top.appendChild(h('div',{class:'sc-num'},''+(i+1)));
    (function(idx){
      var badge=h('button',{class:'badge',style:{background:t.bg,border:'1.5px solid '+t.color,color:t.color}});
      badge.addEventListener('click',function(){showPicker(idx)});badge.textContent=t.icon+' '+t.label+' ▼';
      top.appendChild(badge);
      var acts=h('div',{class:'sc-acts'});
      var up=h('button',{class:'mv'},idx===0?'':'↑');if(idx===0)up.disabled=true;
      up.addEventListener('click',function(){if(idx>0)swap(idx,idx-1)});acts.appendChild(up);
      var dn=h('button',{class:'mv'},idx===S.steps.length-1?'':'↓');if(idx===S.steps.length-1)dn.disabled=true;
      dn.addEventListener('click',function(){if(idx<S.steps.length-1)swap(idx,idx+1)});acts.appendChild(dn);
      if(S.steps.length>1){var del=h('button',{class:'del'});del.textContent='삭제';del.addEventListener('click',function(){S.steps.splice(idx,1);R()});acts.appendChild(del)}
      top.appendChild(acts);
    })(i);
    card.appendChild(top);

    // Route
    var rt=h('div',{class:'rt'});
    (function(idx){
      var fi=h('input',{type:'text',value:st.from});
      fi.addEventListener('change',function(ev){S.steps[idx].from=ev.target.value;if(idx>0)S.steps[idx-1].to=ev.target.value;syncInfo(idx);R()});
      rt.appendChild(fi);
      rt.appendChild(h('span',{style:{fontSize:'14px',color:'#6B6B6B',flexShrink:'0'}},' → '));
      var ti=h('input',{type:'text',value:st.to});
      ti.addEventListener('change',function(ev){S.steps[idx].to=ev.target.value;syncInfo(idx);propagate(idx,ev.target.value);R()});
      rt.appendChild(ti);
    })(i);
    card.appendChild(rt);
    card.appendChild(h('p',{style:{fontSize:'12px',color:'#6B6B6B'}},st.duration));

    // Info
    var flds=TF[st.transport]||[];
    if(flds.length){
      var ed=h('div',{class:'ie'});ed.appendChild(h('p',null,'🔧 상세 정보'));
      flds.forEach(function(f){(function(si,fk,fp,fl){
        var fd=h('div',{class:'gf'});fd.appendChild(h('label',null,fl));
        var inp=h('input',{type:'text',value:(st.info||{})[fk]||'',placeholder:fp});
        inp.addEventListener('input',function(ev){if(!S.steps[si].info)S.steps[si].info={};S.steps[si].info[fk]=ev.target.value});
        inp.addEventListener('change',function(ev){
          if(!S.steps[si].info)S.steps[si].info={};S.steps[si].info[fk]=ev.target.value;
          if(S.steps[si].transport==='transfer'){
            if(fk==='transferStation'){S.steps[si].from=ev.target.value;S.steps[si].to=ev.target.value;if(si>0){S.steps[si-1].to=ev.target.value;syncInfo(si-1)}propagate(si,ev.target.value)}
            if(fk==='destStation'){for(var k=si+1;k<S.steps.length;k++){if(S.steps[k].transport!=='transfer'){S.steps[k].to=ev.target.value;syncInfo(k);break}}}
          }
          if((S.steps[si].transport==='ktx'||S.steps[si].transport==='srt')&&fk==='destination'){S.steps[si].to=ev.target.value;propagate(si,ev.target.value)}
          R();
        });
        fd.appendChild(inp);ed.appendChild(fd);
      })(i,f[0],f[2],f[1])});
      card.appendChild(ed);
    }

    // Photos
    var photos=st.photos||[];
    var pr=h('div',{class:'ph'});
    photos.forEach(function(photo,pi){(function(si,pidx){var im=h('img',{src:photo});im.addEventListener('click',function(){doUp(si,pidx)});pr.appendChild(im)})(i,pi)});
    (function(si){var ab=h('button',{class:'ap'});ab.textContent='+';ab.addEventListener('click',function(){doUp(si,photos.length)});pr.appendChild(ab)})(i);
    card.appendChild(pr);
    w.appendChild(card);
  });

  // 미리보기
  var pv=h('div',{class:'pvs'});
  pv.appendChild(h('h3',{style:{fontSize:'13px',fontWeight:'700',color:'#2D5A27',marginBottom:'6px'}},'👀 부모님 화면 미리보기'));
  var pvt='';S.steps.forEach(function(st,i){pvt+=(i+1)+'. '+st.from+' → '+st.to+' ('+gT(st.transport).label+')\n'});
  pv.appendChild(h('p',{style:{fontSize:'13px',color:'#1A1A1A',whiteSpace:'pre-line',lineHeight:'1.7'}},pvt));
  pv.appendChild(h('p',{style:{fontSize:'12px',color:'#2D5A27',marginTop:'6px'}},'📞 '+S.phone));
  w.appendChild(pv);

  // 저장 버튼
  var sv=h('button',{class:'bb',style:{background:'#2D5A27',marginTop:'6px'}});
  sv.appendChild(h('span',{style:{fontSize:'24px'}},'☁️'));
  sv.appendChild(document.createTextNode('저장하기 (부모님 앱에 반영)'));
  sv.addEventListener('click',function(){saveToCloud()});
  w.appendChild(sv);

  w.appendChild(h('p',{style:{textAlign:'center',fontSize:'12px',color:'#6B6B6B',marginTop:'6px',lineHeight:'1.5'}},'저장하면 부모님 앱에 자동으로 반영됩니다\n부모님은 앱 아이콘만 터치하시면 됩니다'));

  app.appendChild(w);
}

function showPicker(si){
  var ov=h('div',{class:'pov'});ov.addEventListener('click',function(){ov.remove()});
  var sh=h('div',{class:'psh'});sh.addEventListener('click',function(ev){ev.stopPropagation()});
  sh.appendChild(h('h3',{style:{fontSize:'20px',fontWeight:'800',textAlign:'center',marginBottom:'16px'}},'교통수단 선택'));
  var gr=h('div',{class:'pgr'});
  TO.forEach(function(t){var sl=S.steps[si].transport===t.key;
    var btn=h('button',{style:{background:sl?t.bg:'#fff',border:sl?'3px solid '+t.color:'2px solid #E8E4DC'}});
    btn.addEventListener('click',function(){S.steps[si].transport=t.key;S.steps[si].info={};S.steps[si].drv=t.key==='taxi'?(S.steps[si].to+'으로\n가 주세요'):null;ov.remove();R()});
    btn.appendChild(h('span',{style:{fontSize:'28px'}},t.icon));
    btn.appendChild(h('span',{style:{fontSize:'15px',fontWeight:'700',color:sl?t.color:'#1A1A1A'}},t.label));
    gr.appendChild(btn);
  });
  sh.appendChild(gr);ov.appendChild(sh);app.appendChild(ov);
}

R();
</script>
